services:
  pay_page:
    image: nginx:alpine
    container_name: pay_page
    restart: unless-stopped
    environment:
      - TZ=Asia/Taipei
    ports:
      - "5080:80"
    volumes:
      - ./index.html:/usr/share/nginx/html/index.html:ro
      - ./links.json:/usr/share/nginx/html/links.json:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - Userbridge
      - default

networks:
  Userbridge:
    external: true
